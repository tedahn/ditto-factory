apiVersion: v1
kind: ServiceAccount
metadata:
  name: df-controller
  namespace: aal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: df-job-manager
  namespace: aal
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: df-job-manager
  namespace: aal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: df-job-manager
subjects:
  - kind: ServiceAccount
    name: df-controller
    namespace: aal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: df-controller
  namespace: aal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: df-controller
  template:
    metadata:
      labels:
        app: df-controller
    spec:
      serviceAccountName: df-controller
      containers:
        - name: controller
          image: ditto-factory-controller:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DF_REDIS_URL
              value: "redis://redis.aal.svc.cluster.local:6379"
            - name: DF_DATABASE_URL
              value: "sqlite:////app/data/aal.db"
            - name: DF_SLACK_ENABLED
              value: "false"
            - name: DF_LINEAR_ENABLED
              value: "false"
            - name: DF_GITHUB_ENABLED
              value: "false"
            - name: DF_AGENT_IMAGE
              value: "ditto-factory-agent:latest"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: df-controller
  namespace: aal
spec:
  type: NodePort
  selector:
    app: df-controller
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
