apiVersion: v1
kind: ServiceAccount
metadata:
  name: ditto-factory-controller
  namespace: e2e-ditto-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ditto-factory-job-manager
  namespace: e2e-ditto-test
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ditto-factory-job-manager-binding
  namespace: e2e-ditto-test
subjects:
  - kind: ServiceAccount
    name: ditto-factory-controller
    namespace: e2e-ditto-test
roleRef:
  kind: Role
  name: ditto-factory-job-manager
  apiGroup: rbac.authorization.k8s.io
