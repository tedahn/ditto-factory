services:
  controller:
    build:
      context: .
      dockerfile: images/controller/Dockerfile
    ports: ["8000:8000"]
    environment:
      DF_REDIS_URL: redis://redis:6379
      DF_DATABASE_URL: sqlite:////app/data/aal.db
      DF_SLACK_ENABLED: "false"
      DF_LINEAR_ENABLED: "false"
      DF_GITHUB_ENABLED: "false"
    volumes:
      - appdata:/app/data
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aal
      POSTGRES_USER: aal
      POSTGRES_PASSWORD: aal
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aal"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  appdata:
