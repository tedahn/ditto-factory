apiVersion: v1
kind: Service
metadata:
  name: {{ include "ditto-factory.fullname" . }}-controller
  labels:
    {{- include "ditto-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ditto-factory.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
