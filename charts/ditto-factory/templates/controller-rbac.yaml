apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ditto-factory.fullname" . }}-job-manager
  labels:
    {{- include "ditto-factory.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ditto-factory.fullname" . }}-job-manager
  labels:
    {{- include "ditto-factory.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ditto-factory.fullname" . }}-job-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "ditto-factory.fullname" . }}
    namespace: {{ .Release.Namespace }}
