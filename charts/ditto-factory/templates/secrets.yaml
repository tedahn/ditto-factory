apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ditto-factory.fullname" . }}-secrets
  labels:
    {{- include "ditto-factory.labels" . | nindent 4 }}
type: Opaque
data:
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  slack-signing-secret: {{ .Values.secrets.slackSigningSecret | b64enc | quote }}
  slack-bot-token: {{ .Values.secrets.slackBotToken | b64enc | quote }}
  linear-webhook-secret: {{ .Values.secrets.linearWebhookSecret | b64enc | quote }}
  linear-api-key: {{ .Values.secrets.linearApiKey | b64enc | quote }}
  github-webhook-secret: {{ .Values.secrets.githubWebhookSecret | b64enc | quote }}
  github-app-id: {{ .Values.secrets.githubAppId | b64enc | quote }}
  github-private-key: {{ .Values.secrets.githubPrivateKey | b64enc | quote }}
  token-encryption-key: {{ .Values.secrets.tokenEncryptionKey | b64enc | quote }}
