{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ditto-factory.fullname" . }}-agent
  labels:
    {{- include "ditto-factory.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: ditto-factory-agent
  policyTypes:
    - Egress
    - Ingress
  ingress: []
  egress:
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow GitHub API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - port: 6379
          protocol: TCP
{{- end }}
