apiVersion: v2
name: ditto-factory
description: K8s-native coding agent platform using headless Claude Code
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
